services:

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pong-to-rich-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILE: prod
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      KIS_APP_KEY: ${KIS_APP_KEY}
      KIS_APP_SECRET: ${KIS_APP_SECRET}
      KIS_BASE_URL: ${KIS_BASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pong-network

  mysql:
    image: mysql:8.0
    container_name: pong-to-rich-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - pong-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # redis:          ← Phase 8 (알림/캐시) 때 추가
  # kafka:          ← Phase 16 (Kafka) 때 추가
  # elasticsearch:  ← Phase 16 (ES) 때 추가

  # prometheus, grafana → monitoring-server VM에서 별도 docker-compose로 실행
  # monitoring/docker-compose.yml 참고

networks:
  pong-network:
    driver: bridge

volumes:
  mysql-data:
