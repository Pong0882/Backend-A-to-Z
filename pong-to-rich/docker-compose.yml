services:

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pong-to-rich-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILE: prod
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      KIS_APP_KEY: ${KIS_APP_KEY}
      KIS_APP_SECRET: ${KIS_APP_SECRET}
      KIS_BASE_URL: ${KIS_BASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - pong-network

  mysql:
    image: mysql:8.0
    container_name: pong-to-rich-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - pong-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Promtail вҖ” pong-to-rich-app м»Ён…Ңмқҙл„Ҳ лЎңк·ёлҘј мқҪм–ҙм„ң monitoring-server LokiлЎң м „мҶЎ
  # Lokiк°Җ monitoring-serverм—җ мһҲм–ҙм„ң к°ҷмқҖ docker-compose л„ӨнҠёмӣҢнҒ¬лЎң м ‘к·ј л¶Ҳк°Җ
  # вҶ’ LOKI_URL нҷҳкІҪліҖмҲҳлЎң мҷёл¶Җ IP мЈјмһ… (.envм—җм„ң кҙҖлҰ¬)
  promtail:
    image: grafana/promtail:latest
    container_name: pong-promtail
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml  # м„Өм • нҢҢмқј л§ҲмҡҙнҠё
      - /var/lib/docker/containers:/var/lib/docker/containers:ro    # Docker м»Ён…Ңмқҙл„Ҳ лЎңк·ё мқҪкё° (мқҪкё° м „мҡ©)
      - /var/run/docker.sock:/var/run/docker.sock                   # Docker мҶҢмј“ (м»Ён…Ңмқҙл„Ҳ лӘ©лЎқ мЎ°нҡҢмҡ©)
    environment:
      LOKI_URL: ${LOKI_URL}  # monitoring-server IP (.envм—җм„ң мЈјмһ…)
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true  # нҷҳкІҪліҖмҲҳ м№ҳнҷҳ нҷңм„ұнҷ”
    depends_on:
      - app
    networks:
      - pong-network

  redis:
    image: redis:7-alpine
    container_name: pong-to-rich-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - pong-network
    restart: unless-stopped

  # redis_exporter вҖ” Redis л©”нҠёлҰӯмқ„ Prometheusк°Җ мҲҳм§‘н•  мҲҳ мһҲлҸ„лЎқ л…ём¶ң
  # Prometheusк°Җ мқҙ м»Ён…Ңмқҙл„Ҳмқҳ /metrics м—”л“ңнҸ¬мқёнҠёлҘј мҠӨнҒ¬лһ©
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: pong-redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis
    networks:
      - pong-network
    restart: unless-stopped

  # redis:          вҶҗ Phase 8 (м•ҢлҰј/мәҗмӢң) л•Ң м¶”к°Җ вҶ’ мҷ„лЈҢ
  # kafka:          вҶҗ Phase 16 (Kafka) л•Ң м¶”к°Җ
  # elasticsearch:  вҶҗ Phase 16 (ES) л•Ң м¶”к°Җ

  # prometheus, grafana, loki вҶ’ monitoring-server VMм—җм„ң лі„лҸ„ docker-composeлЎң мӢӨн–ү
  # monitoring/docker-compose.yml м°ёкі 

networks:
  pong-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
