spring:
  application:
    name: pong-to-rich

  profiles:
    active: ${SPRING_PROFILE:local}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:1800000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# AES-256 암호화 키 — 반드시 32바이트(256bit). application-local.yml 또는 운영 .env에서 주입
# 예시 32바이트 키: local-dev-encrypt-key-32bytes!
encrypt:
  secret-key: ${ENCRYPT_SECRET_KEY}

springdoc:
  swagger-ui:
    path: /swagger    # 접속 경로
  api-docs:
    path: /api-docs            # JSON 스펙 경로

