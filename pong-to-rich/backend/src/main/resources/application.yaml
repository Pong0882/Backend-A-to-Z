spring:
  application:
    name: pong-to-rich

  profiles:
    active: ${SPRING_PROFILE:local}

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

springdoc:
  swagger-ui:
    path: /swagger    # 접속 경로
  api-docs:
    path: /api-docs            # JSON 스펙 경로

jwt:
  secret: pong-to-rich-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-token-expiration: 1800000    # 30분 (ms)
  refresh-token-expiration: 604800000 # 7일 (ms)