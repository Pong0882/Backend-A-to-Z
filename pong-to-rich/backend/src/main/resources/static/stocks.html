<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주식 시세 — Pong to Rich</title>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #1e2a3a;
      color: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 960px;
      margin: 0 auto 32px;
    }

    .back-btn {
      color: #a0b0c0;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back-btn:hover { color: #fff; }

    h1 { font-size: 1.6rem; font-weight: 700; }

    /* ── 종목 선택 ── */
    .stock-selector {
      max-width: 960px;
      margin: 0 auto 24px;
    }

    .stock-selector select {
      background: #263445;
      color: #ffffff;
      border: 1px solid #2c3e50;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 1rem;
      cursor: pointer;
      min-width: 260px;
    }

    .stock-selector select:focus {
      outline: none;
      border-color: #3498db;
    }

    /* ── 현재가 카드 ── */
    .stock-card {
      max-width: 960px;
      margin: 0 auto 24px;
      background: #263445;
      border-radius: 12px;
      padding: 24px;
    }

    .stock-name  { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
    .stock-code  { font-size: 0.85rem; color: #a0b0c0; }

    .current-price {
      font-size: 2rem;
      font-weight: 700;
      margin-top: 12px;
    }

    .change-up   { color: #e74c3c; }
    .change-down { color: #3498db; }
    .change-flat { color: #a0b0c0; }

    .price-detail {
      display: flex;
      gap: 24px;
      margin-top: 12px;
      font-size: 0.85rem;
      color: #a0b0c0;
    }

    /* ── 차트 영역 ── */
    .chart-wrap {
      max-width: 960px;
      margin: 0 auto 24px;
      background: #263445;
      border-radius: 12px;
      overflow: hidden;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid #2c3e50;
    }

    .chart-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #a0b0c0;
    }

    .chart-tooltip {
      font-size: 0.82rem;
      color: #c8d8e8;
      min-height: 1.2em;
    }

    #candleChart  { width: 100%; height: 360px; }
    #volumeChart  { width: 100%; height: 100px; border-top: 1px solid #2c3e50; }

    /* ── 일봉 테이블 ── */
    .table-wrap {
      max-width: 960px;
      margin: 0 auto;
      background: #263445;
      border-radius: 12px;
      overflow: hidden;
    }

    .table-header {
      padding: 16px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      border-bottom: 1px solid #2c3e50;
      color: #a0b0c0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      padding: 12px 16px;
      text-align: right;
      color: #a0b0c0;
      font-weight: 500;
      border-bottom: 1px solid #2c3e50;
    }

    thead th:first-child { text-align: left; }

    tbody tr:hover { background: #2c3e50; }

    tbody td {
      padding: 10px 16px;
      text-align: right;
      border-bottom: 1px solid #1e2a3a;
    }

    tbody td:first-child { text-align: left; color: #a0b0c0; }

    .loading { text-align: center; padding: 48px; color: #a0b0c0; }
    .error   { text-align: center; padding: 48px; color: #e74c3c; }
  </style>
</head>
<body>

  <div class="header">
    <a href="/" class="back-btn">← 홈으로</a>
    <h1>주식 시세</h1>
  </div>

  <!-- 종목 선택 -->
  <div class="stock-selector">
    <select id="stockSelect">
      <option value="">종목 불러오는 중...</option>
    </select>
  </div>

  <!-- 현재가 카드 -->
  <div class="stock-card" id="currentCard">
    <div class="loading">종목을 선택해주세요.</div>
  </div>

  <!-- 캔들차트 + 거래량 차트 -->
  <div class="chart-wrap">
    <div class="chart-header">
      <span class="chart-title" id="chartTitle">캔들차트</span>
      <span class="chart-tooltip" id="chartTooltip"></span>
    </div>
    <div id="candleChart"></div>
    <div id="volumeChart"></div>
  </div>

  <!-- 일봉 테이블 -->
  <div class="table-wrap">
    <div class="table-header" id="tableTitle">일봉 데이터</div>
    <div id="tableArea">
      <div class="loading">종목을 선택해주세요.</div>
    </div>
  </div>

  <script>
    let currentCode = null;
    let currentName = null;
    let candleChartInstance = null;
    let volumeChartInstance = null;

    const fmt = n => Number(n).toLocaleString('ko-KR');

    function changeInfo(sign, amount, rate) {
      const cls   = sign === '2' || sign === '1' ? 'change-up'
                  : sign === '4' || sign === '5' ? 'change-down'
                  : 'change-flat';
      const arrow = sign === '2' || sign === '1' ? '▲'
                  : sign === '4' || sign === '5' ? '▼' : '-';
      return { cls, text: `${arrow} ${fmt(Math.abs(amount))} (${rate}%)` };
    }

    // ── 종목 목록 로드 ────────────────────────────────────────────
    async function loadStockList() {
      try {
        const res  = await fetch('/api/stocks');
        const json = await res.json();
        const list = json.data;

        const select = document.getElementById('stockSelect');
        select.innerHTML = '<option value="">종목 선택...</option>';

        list.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.code;
          opt.textContent = `${s.name} (${s.code})`;
          select.appendChild(opt);
        });

        // 첫 번째 종목 자동 선택
        if (list.length > 0) {
          select.value = list[0].code;
          onStockChange(list[0].code, list[0].name);
        }
      } catch (e) {
        document.getElementById('stockSelect').innerHTML =
          '<option value="">종목 목록 조회 실패</option>';
      }
    }

    // ── 종목 변경 시 ──────────────────────────────────────────────
    function onStockChange(code, name) {
      currentCode = code;
      currentName = name;

      document.getElementById('chartTitle').textContent = `캔들차트 · ${name} (${code})`;
      document.getElementById('tableTitle').textContent = `일봉 데이터 · ${name} (${code})`;
      document.getElementById('currentCard').innerHTML = '<div class="loading">현재가 불러오는 중...</div>';
      document.getElementById('tableArea').innerHTML   = '<div class="loading">데이터 불러오는 중...</div>';
      document.getElementById('chartTooltip').textContent = '';

      // 이전 차트 제거
      if (candleChartInstance) { candleChartInstance.remove(); candleChartInstance = null; }
      if (volumeChartInstance) { volumeChartInstance.remove(); volumeChartInstance = null; }

      loadCurrentPrice(code, name);
      loadDailyPrices(code, name);
    }

    document.getElementById('stockSelect').addEventListener('change', function () {
      const code = this.value;
      const name = this.options[this.selectedIndex].textContent.replace(/ \(.*\)$/, '');
      if (code) onStockChange(code, name);
    });

    // ── 캔들차트 초기화 ──────────────────────────────────────────
    function initCharts(list) {
      const sorted = [...list].reverse();

      const candleData = sorted.map(d => ({
        time:  String(d.tradeDate),
        open:  d.openPrice,
        high:  d.highPrice,
        low:   d.lowPrice,
        close: d.closePrice,
      }));

      const volumeData = sorted.map(d => ({
        time:  String(d.tradeDate),
        value: d.volume,
        color: d.closePrice >= d.openPrice ? 'rgba(231,76,60,0.5)' : 'rgba(52,152,219,0.5)',
      }));

      const commonOpts = {
        layout: {
          background: { color: '#263445' },
          textColor:  '#a0b0c0',
        },
        grid: {
          vertLines: { color: '#2c3e50' },
          horzLines: { color: '#2c3e50' },
        },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        timeScale: {
          borderColor:    '#2c3e50',
          timeVisible:    true,
          secondsVisible: false,
        },
        rightPriceScale: { borderColor: '#2c3e50' },
        handleScroll:    { mouseWheel: true, pressedMouseMove: true },
        handleScale:     { mouseWheel: true, pinch: true },
      };

      const candleEl = document.getElementById('candleChart');
      candleChartInstance = LightweightCharts.createChart(candleEl, {
        ...commonOpts,
        width:  candleEl.offsetWidth,
        height: 360,
      });

      const candleSeries = candleChartInstance.addCandlestickSeries({
        upColor:         '#e74c3c',
        downColor:       '#3498db',
        borderUpColor:   '#e74c3c',
        borderDownColor: '#3498db',
        wickUpColor:     '#e74c3c',
        wickDownColor:   '#3498db',
      });
      candleSeries.setData(candleData);

      const volumeEl = document.getElementById('volumeChart');
      volumeChartInstance = LightweightCharts.createChart(volumeEl, {
        ...commonOpts,
        width:  volumeEl.offsetWidth,
        height: 100,
        timeScale: { ...commonOpts.timeScale, visible: false },
      });

      const volumeSeries = volumeChartInstance.addHistogramSeries({
        priceFormat:  { type: 'volume' },
        priceScaleId: '',
        scaleMargins: { top: 0.1, bottom: 0 },
      });
      volumeSeries.setData(volumeData);

      candleChartInstance.timeScale().subscribeVisibleLogicalRangeChange(range => {
        if (range) volumeChartInstance.timeScale().setVisibleLogicalRange(range);
      });
      volumeChartInstance.timeScale().subscribeVisibleLogicalRangeChange(range => {
        if (range) candleChartInstance.timeScale().setVisibleLogicalRange(range);
      });

      const tooltip = document.getElementById('chartTooltip');
      candleChartInstance.subscribeCrosshairMove(param => {
        if (!param || !param.time) { tooltip.textContent = ''; return; }
        const c = param.seriesData.get(candleSeries);
        const v = volumeData.find(d => d.time === param.time);
        if (c) {
          const diff  = c.close - c.open;
          const cls   = diff >= 0 ? '#e74c3c' : '#3498db';
          const arrow = diff >= 0 ? '▲' : '▼';
          tooltip.innerHTML =
            `<span style="color:#c8d8e8">${param.time}</span> &nbsp;
             시 <b>${fmt(c.open)}</b> &nbsp;
             고 <b style="color:#e74c3c">${fmt(c.high)}</b> &nbsp;
             저 <b style="color:#3498db">${fmt(c.low)}</b> &nbsp;
             종 <b style="color:${cls}">${fmt(c.close)}</b> &nbsp;
             <span style="color:${cls}">${arrow}${fmt(Math.abs(diff))}</span> &nbsp;
             거래량 <b>${v ? fmt(v.value) : '-'}</b>`;
          volumeChartInstance.setCrosshairPosition(v ? v.value : 0, param.time, volumeSeries);
        }
      });

      window.addEventListener('resize', () => {
        candleChartInstance.applyOptions({ width: candleEl.offsetWidth });
        volumeChartInstance.applyOptions({ width: volumeEl.offsetWidth });
      });

      candleChartInstance.timeScale().fitContent();
    }

    // ── 최신 일봉으로 현재가 카드 폴백 ──────────────────────────
    function renderCurrentCard(prices, code, name) {
      if (!prices || prices.length === 0) {
        document.getElementById('currentCard').innerHTML =
          `<div class="error">현재가 데이터가 없습니다.</div>`;
        return;
      }

      const latest = prices[0];
      const prev   = prices[1];
      const diff   = prev ? latest.closePrice - prev.closePrice : 0;
      const rate   = prev ? ((diff / prev.closePrice) * 100).toFixed(2) : '0.00';
      const cls    = diff > 0 ? 'change-up' : diff < 0 ? 'change-down' : 'change-flat';
      const arrow  = diff > 0 ? '▲' : diff < 0 ? '▼' : '-';

      document.getElementById('currentCard').innerHTML = `
        <div class="stock-name">${name}</div>
        <div class="stock-code">${code} · 기준일: ${latest.tradeDate}</div>
        <div class="current-price">${fmt(latest.closePrice)} <small style="font-size:1rem">원</small></div>
        <div class="price-detail">
          <span class="${cls}">${arrow} ${fmt(Math.abs(diff))} (${rate}%)</span>
          <span>고가 ${fmt(latest.highPrice)}</span>
          <span>저가 ${fmt(latest.lowPrice)}</span>
          <span>거래량 ${fmt(latest.volume)}</span>
        </div>
      `;
    }

    // ── 현재가 API (한투 실시간) ─────────────────────────────────
    async function loadCurrentPrice(code, name) {
      try {
        const res  = await fetch(`/api/stocks/${code}`);
        const json = await res.json();
        const d    = json.data;

        if (!d || !d.stck_prpr) return;

        const { cls, text } = changeInfo(d.prdy_vrss_sign, d.prdy_vrss, d.prdy_ctrt);

        document.getElementById('currentCard').innerHTML = `
          <div class="stock-name">${name}</div>
          <div class="stock-code">${code} · 실시간</div>
          <div class="current-price ${cls}">${fmt(d.stck_prpr)} <small style="font-size:1rem">원</small></div>
          <div class="price-detail">
            <span class="${cls}">${text}</span>
            <span>고가 ${fmt(d.stck_hgpr)}</span>
            <span>저가 ${fmt(d.stck_lwpr)}</span>
            <span>거래량 ${fmt(d.acml_vol)}</span>
          </div>
        `;
      } catch (e) {
        // 실패 무시 — loadDailyPrices 폴백이 처리
      }
    }

    // ── 일봉 데이터 → 차트 + 테이블 ────────────────────────────
    async function loadDailyPrices(code, name) {
      try {
        const res  = await fetch(`/api/stocks/${code}/prices`);
        const json = await res.json();
        const list = json.data;

        if (!list || list.length === 0) {
          document.getElementById('tableArea').innerHTML =
            `<div class="error">저장된 데이터가 없습니다.</div>`;
          renderCurrentCard(null, code, name);
          return;
        }

        if (document.getElementById('currentCard').querySelector('.loading')) {
          renderCurrentCard(list, code, name);
        }

        initCharts(list);

        const rows = list.map(d => `
          <tr>
            <td>${d.tradeDate}</td>
            <td>${fmt(d.openPrice)}</td>
            <td>${fmt(d.highPrice)}</td>
            <td>${fmt(d.lowPrice)}</td>
            <td>${fmt(d.closePrice)}</td>
            <td>${fmt(d.volume)}</td>
          </tr>
        `).join('');

        document.getElementById('tableArea').innerHTML = `
          <table>
            <thead>
              <tr>
                <th>날짜</th>
                <th>시가</th>
                <th>고가</th>
                <th>저가</th>
                <th>종가</th>
                <th>거래량</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      } catch (e) {
        document.getElementById('tableArea').innerHTML =
          `<div class="error">데이터 조회 실패</div>`;
      }
    }

    // 페이지 로드 시 종목 목록부터
    loadStockList();
  </script>

</body>
</html>
